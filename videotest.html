<!DOCTYPE html>
<html>
<head><title>Video Test</title></head>
<body style="background:#111;color:#fff;padding:40px;font-family:sans-serif;">

<h2>Video Test</h2>

<p>Direct video tag (should play inline):</p>
<video src="videos/placeholder.mp4" controls width="300" style="display:block;margin-bottom:30px;"></video>

<p>Click button to play in modal:</p>
<button id="openBtn" style="padding:12px 24px;font-size:1rem;cursor:pointer;">Click to Play Video</button>

<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;align-items:center;justify-content:center;">
  <div style="position:relative;width:90%;max-width:500px;">
    <button id="closeBtn" style="position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;">&times;</button>
    <video id="modalVideo" src="videos/placeholder.mp4" controls style="width:100%;display:block;background:#000;"></video>
  </div>
</div>

<script>
  var modal = document.getElementById('modal');
  var video = document.getElementById('modalVideo');

  document.getElementById('openBtn').addEventListener('click', function(){
    modal.style.display = 'flex';
    video.play().catch(function(e){ alert('Play error: ' + e.message); });
  });

  document.getElementById('closeBtn').addEventListener('click', function(){
    modal.style.display = 'none';
    video.pause();
    video.currentTime = 0;
  });
</script>
</body>
</html>
